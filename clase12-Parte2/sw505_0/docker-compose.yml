services:
  db:
    image: postgres:15-alpine
    container_name: db_postgres
    restart: always
    environment:
      POSTGRES_USER: uni_admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: sisman
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_web
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sisman.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  api:
    build: ./backend
    container_name: fastapi_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # La URL de conexión usa el nombre del servicio "db"
      DATABASE_URL: postgresql://uni_admin:123456@db:5432/sisman
    depends_on:
      - db

volumes:
  postgres_data: